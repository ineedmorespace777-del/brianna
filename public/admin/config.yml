# Decap CMS schema — what shows up as editable fields in /admin
# Backend: GitHub OAuth via /api/auth (custom Vercel serverless function)

backend:
  name: github
  repo: ineedmorespace777-del/brianna
  branch: master
  base_url: https://brianna.philipngo.ca
  auth_endpoint: /api/auth

# clickable "View site" link in the CMS header that takes you back to the public site
display_url: https://brianna.philipngo.ca
site_url: https://brianna.philipngo.ca
logo_url: https://brianna.philipngo.ca/assets/mei-logo.png

media_folder: "public/assets/uploads"
public_folder: "/assets/uploads"

publish_mode: simple

# tip: any field labeled "with *italic* allowed" supports markdown-style italics:
# wrap a word in asterisks like *this* to make it italic on the page.

collections:
  - name: "site"
    label: "Site Content"
    files:
      - file: "src/content/site.json"
        name: "site"
        label: "Mei Skin Studio — All Editable Text"
        format: "json"
        editor:
          preview: false
        fields:

          # ─────────────────── META / SEO ───────────────────
          - label: "Meta / SEO"
            name: "meta"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Browser tab title", name: "title", widget: "string" }
              - { label: "Search engine description", name: "description", widget: "text" }
              - { label: "Social share — title", name: "og_title", widget: "string" }
              - { label: "Social share — description", name: "og_description", widget: "text" }
              - { label: "Twitter — title", name: "twitter_title", widget: "string" }
              - { label: "Twitter — description", name: "twitter_description", widget: "string" }
              - { label: "Theme color (browser UI tint)", name: "theme_color", widget: "string", default: "#f7f2ea" }

          # ─────────────────── COMING SOON GATE ───────────────────
          - label: "Coming Soon Splash"
            name: "comingSoon"
            widget: "object"
            collapsed: false
            fields:
              - { label: "Show the splash?", name: "enabled", widget: "boolean", default: true, hint: "Turn off when you're ready to launch the public site." }
              - { label: "Password", name: "password", widget: "string", default: "meiskin", hint: "Visitors enter this to see the site. Lowercase, no spaces." }
              - { label: "Top label", name: "eyebrow", widget: "string" }
              - { label: "Big title (italics with *asterisks*)", name: "title", widget: "string", hint: "Wrap the italic word in *asterisks*. e.g. '*coming* soon.'" }
              - { label: "Subtitle paragraph", name: "sub", widget: "text" }
              - { label: "Instagram link label", name: "ig_label", widget: "string", default: "follow @meiskinstudio" }

          # ─────────────────── BRAND ───────────────────
          - label: "Brand & Socials"
            name: "brand"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Brand name", name: "name", widget: "string" }
              - { label: "Instagram URL", name: "ig_url", widget: "string" }
              - { label: "TikTok URL", name: "tiktok_url", widget: "string", required: false }

          # ─────────────────── OVERLAY NAV ───────────────────
          - label: "Overlay Menu"
            name: "overlayNav"
            widget: "object"
            collapsed: true
            fields:
              - label: "Menu items"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "Anchor or URL", name: "anchor", widget: "string", hint: "#menu, #book, or a full URL." }
              - { label: "Book button label", name: "book_label", widget: "string" }
              - { label: "Footer left text", name: "foot_left", widget: "string" }
              - { label: "Footer right text", name: "foot_right", widget: "string" }

          # ─────────────────── HERO ───────────────────
          - label: "Hero (first thing visitors see)"
            name: "hero"
            widget: "object"
            collapsed: false
            fields:
              - { label: "Eyebrow (small label above title)", name: "eyebrow", widget: "string" }
              - { label: "Big title (use newlines for line breaks, *asterisks* for italics)", name: "title", widget: "text", hint: "Each new line becomes a separate line on screen. Wrap italic words in *asterisks*." }
              - { label: "Subtitle paragraph", name: "sub", widget: "text" }
              - { label: "Primary button label", name: "cta_primary_label", widget: "string" }
              - { label: "Secondary button label", name: "cta_secondary_label", widget: "string" }
              - { label: "Hero image: caption label", name: "frame_label", widget: "string", required: false, hint: "Small italic caption inside the hero image frame. Leave blank for none." }
              - label: "Hero image: tint"
                name: "frame_tint"
                widget: "select"
                default: ""
                required: false
                hint: "(currently neutralized — all placeholders share the same color regardless of this)"
                options:
                  - { label: "Blush (default)", value: "" }
                  - { label: "Sage", value: "tint-sage" }
                  - { label: "Clay", value: "tint-clay" }
              - { label: "Hero chip text", name: "chip_label", widget: "string", required: false, hint: "Floating chip on hero image (e.g., 'now booking'). Leave blank to hide." }
              - label: "Hero meta (small proof points under CTAs)"
                name: "meta"
                widget: "list"
                summary: "{{fields.dt}} · {{fields.dd}}"
                fields:
                  - { label: "Number/word", name: "dt", widget: "string", hint: "e.g. 'one', '60 min+', 'no'" }
                  - { label: "Caption", name: "dd", widget: "string", hint: "e.g. 'face at a time, by appointment'" }

          # ─────────────────── MARQUEE ───────────────────
          - label: "Marquee (scrolling text under hero)"
            name: "marquee"
            widget: "object"
            collapsed: true
            fields:
              - label: "Items (scroll across as a continuous loop)"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Phrase", name: "{{name}}", widget: "string", required: true }
                summary: "{{fields.phrase}}"

          # ─────────────────── PHILOSOPHY ───────────────────
          - label: "Philosophy section"
            name: "philosophy"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title", name: "title", widget: "text", hint: "Newlines = line breaks. *italic* allowed." }
              - { label: "Intro paragraph (lede)", name: "lede", widget: "text" }
              - label: "Three pillars"
                name: "triad"
                widget: "list"
                fields:
                  - { label: "Number (01, 02, 03)", name: "num", widget: "string" }
                  - { label: "Pillar title", name: "title", widget: "string", hint: "*italic* allowed" }
                  - { label: "Pillar body", name: "body", widget: "text" }

          # ─────────────────── STUDIO SPLIT ───────────────────
          - label: "Studio Split (image + about copy)"
            name: "studioSplit"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title", name: "title", widget: "string", hint: "*italic* allowed" }
              - { label: "Paragraph 1 — text before link", name: "body_p1_before_link", widget: "text" }
              - { label: "Paragraph 1 — link text", name: "body_p1_link_text", widget: "string" }
              - { label: "Paragraph 1 — link URL", name: "body_p1_link_url", widget: "string" }
              - { label: "Paragraph 1 — text after link", name: "body_p1_after_link", widget: "text" }
              - { label: "Paragraph 2", name: "body_p2", widget: "text" }
              - { label: "Button label", name: "cta_label", widget: "string" }
              - { label: "Image caption label", name: "frame_label", widget: "string", required: false, hint: "Small italic caption inside the image frame." }
              - label: "Image tint"
                name: "frame_tint"
                widget: "select"
                default: "tint-sage"
                required: false
                hint: "(currently neutralized — all placeholders share the same color regardless of this)"
                options:
                  - { label: "Blush (default)", value: "" }
                  - { label: "Sage", value: "tint-sage" }
                  - { label: "Clay", value: "tint-clay" }

          # ─────────────────── SERVICES MENU ───────────────────
          - label: "Services Menu"
            name: "services"
            widget: "object"
            collapsed: false
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Note (small caption at the top of the menu)", name: "note", widget: "string", required: false }
              - label: "Services"
                name: "items"
                widget: "list"
                summary: "{{fields.name}} · {{fields.duration}} · {{fields.price}}"
                fields:
                  - { label: "Image key (internal slug — leave as-is)", name: "img_key", widget: "string" }
                  - { label: "Service name", name: "name", widget: "string" }
                  - { label: "Duration", name: "duration", widget: "string", hint: "e.g. '90 min'" }
                  - { label: "Price", name: "price", widget: "string", required: false, hint: "e.g. '$215' — shown as a tag on the image." }
                  - label: "Image tint"
                    name: "tint"
                    widget: "select"
                    default: ""
                    required: false
                    hint: "(currently neutralized — all placeholders share the same warm sand color, regardless of this setting)"
                    options:
                      - { label: "Blush (default)", value: "" }
                      - { label: "Sage", value: "tint-sage" }
                      - { label: "Clay", value: "tint-clay" }
                  - { label: "Description", name: "description", widget: "text" }
              - { label: "Footnote paragraph", name: "footnote", widget: "text" }
              - { label: "Footnote button label", name: "footnote_cta_label", widget: "string" }

          # ─────────────────── ATMOSPHERE ───────────────────
          - label: "Atmosphere (the editorial pull)"
            name: "atmosphere"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Title", name: "title", widget: "string", hint: "*italic* allowed" }
              - { label: "Body paragraph", name: "body", widget: "text" }
              - label: "Background tint"
                name: "frame_tint"
                widget: "select"
                default: "tint-sage"
                required: false
                hint: "(currently neutralized — all placeholders share the same color regardless of this)"
                options:
                  - { label: "Blush", value: "" }
                  - { label: "Sage (default)", value: "tint-sage" }
                  - { label: "Clay", value: "tint-clay" }

          # ─────────────────── TESTIMONIALS ───────────────────
          - label: "Testimonials"
            name: "testimonials"
            widget: "object"
            collapsed: false
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - label: "Quotes"
                name: "items"
                widget: "list"
                summary: "{{fields.name}}: {{fields.quote}}"
                fields:
                  - { label: "Client name (first name only)", name: "name", widget: "string" }
                  - { label: "Quote", name: "quote", widget: "text" }

          # ─────────────────── LOCATIONS ───────────────────
          - label: "Visit / Location card"
            name: "locations"
            widget: "object"
            collapsed: false
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title", name: "title", widget: "string", hint: "*italic* allowed" }
              - label: "Location cards"
                name: "items"
                widget: "list"
                summary: "{{fields.city_tag}}"
                fields:
                  - { label: "City tag (small label, e.g. KITSILANO)", name: "city_tag", widget: "string" }
                  - { label: "Location name", name: "name", widget: "string", hint: "*italic* allowed" }
                  - { label: "Address (use new lines for line breaks)", name: "address", widget: "text" }
                  - { label: "Image caption", name: "frame_label", widget: "string", required: false }
                  - label: "Image tint"
                    name: "frame_tint"
                    widget: "select"
                    default: "tint-clay"
                    required: false
                    hint: "(currently neutralized — all placeholders share the same color regardless of this)"
                    options:
                      - { label: "Blush", value: "" }
                      - { label: "Sage", value: "tint-sage" }
                      - { label: "Clay (default)", value: "tint-clay" }
                  - label: "Hours"
                    name: "hours"
                    widget: "list"
                    fields:
                      - { label: "Days label", name: "label", widget: "string", hint: "e.g. tue — fri" }
                      - { label: "Hours value", name: "value", widget: "string", hint: "e.g. 10:00a — 7:00p" }
                  - { label: "Primary button label", name: "cta_primary_label", widget: "string" }
                  - { label: "Primary button URL", name: "cta_primary_url", widget: "string" }
                  - { label: "Secondary button label", name: "cta_secondary_label", widget: "string" }
                  - { label: "Secondary button URL", name: "cta_secondary_url", widget: "string" }
              - { label: "Contact line label", name: "contact_line_label", widget: "string" }
              - { label: "Contact email", name: "contact_email", widget: "string" }

          # ─────────────────── NEWSLETTER ───────────────────
          - label: "Newsletter signup"
            name: "newsletter"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title", name: "title", widget: "string", hint: "*italic* allowed" }
              - { label: "Body paragraph", name: "body", widget: "text" }
              - { label: "Name field placeholder", name: "name_placeholder", widget: "string" }
              - { label: "Email field placeholder", name: "email_placeholder", widget: "string" }
              - { label: "Submit button label", name: "submit_label", widget: "string" }

          # ─────────────────── FOOTER ───────────────────
          - label: "Footer"
            name: "footer"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Tagline (under brand logo)", name: "tagline", widget: "string" }
              - label: "Nav columns"
                name: "columns"
                widget: "list"
                summary: "{{fields.heading}}"
                fields:
                  - { label: "Column heading", name: "heading", widget: "string" }
                  - label: "Links"
                    name: "items"
                    widget: "list"
                    fields:
                      - { label: "Label", name: "label", widget: "string" }
                      - { label: "URL", name: "url", widget: "string" }
              - { label: "Copyright name", name: "copyright_name", widget: "string" }
              - label: "Legal links"
                name: "legal_links"
                widget: "list"
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "URL", name: "url", widget: "string" }
