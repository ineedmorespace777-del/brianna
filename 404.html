<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#f5f0e8" />
  <meta name="robots" content="noindex" />
  <title>not here — mei skin studio</title>
  <link rel="icon" type="image/jpeg" href="assets/mei-logo.jpg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;1,9..144,300&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/main.css?v=dots-overlay-5" />
  <style>
    .nf {
      min-height: 100vh;
      min-height: 100svh;
      display: grid; place-items: center;
      padding: 80px 24px;
      text-align: center;
    }
    .nf-num {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: clamp(120px, 22vw, 280px);
      line-height: 1;
      color: var(--accent-deep);
      margin-bottom: .15em;
      font-weight: 300;
    }
    .nf h1 {
      font-family: var(--font-serif);
      font-weight: 300;
      font-size: clamp(32px, 5vw, 56px);
      letter-spacing: -.01em;
      margin-bottom: .5em;
      color: var(--fg);
    }
    .nf p { color: var(--fg-2); max-width: 42ch; margin: 0 auto 2em; }
  </style>
</head>
<body>
  <main class="nf">
    <div>
      <div class="nf-num">404</div>
      <h1>that page isn't here.</h1>
      <p>the page you were looking for has moved, or never existed. let's get you back to the studio.</p>
      <a class="btn btn-primary" href="/">return home</a>
    </div>
  </main>
</body>
</html>
